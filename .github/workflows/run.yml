name: run

on:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install
        run: pip install feedparser requests

      - name: run
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: python check.py
